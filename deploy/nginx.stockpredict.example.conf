# Example: /etc/nginx/sites-available/stockpredict
# Do NOT enable until a domain + TLS cert are ready. The container already binds
# to 127.0.0.1:3002, so nothing is exposed publicly until nginx is wired up.
#
# Replace stock.example.com with your real domain, and adjust the cert paths.

server {
    listen 80;
    server_name stock.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name stock.example.com;

    ssl_certificate     /etc/letsencrypt/live/stock.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stock.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # SSE endpoint (/api/status/...) needs buffering off and a long read timeout
    location /api/status/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding off;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}
